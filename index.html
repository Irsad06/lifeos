<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>LifeOS — Advanced Premium Task Manager</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --glass-bg:rgba(255,255,255,0.25);
            --glass-border:rgba(255,255,255,0.3);
            --shadow:0 8px 32px rgba(0,0,0,0.1);
            --blur:blur(20px);
            --radius:1.25rem;
            --surface:#ffffff;
            --text:#0f172a;
            --text-secondary:#475569;
            --accent:#6366f1;
            --danger:#ef4444;
            --success:#10b981;
            --warning:#f59e0b;
            --bg:#f1f5f9;
        }
        .dark{
            --glass-bg:rgba(15,23,42,0.7);
            --glass-border:rgba(51,65,85,0.5);
            --shadow:0 8px 32px rgba(0,0,0,0.4);
            --surface:#1e293b;
            --text:#f1f5f9;
            --text-secondary:#94a3b8;
            --bg:#0f172a;
        }
        body{
            font-family:'Inter', system-ui, sans-serif;
            background:var(--bg);
            color:var(--text);
            transition:background 0.3s,color 0.3s;
            min-height:100vh;
            margin:0;
        }
        .glass{
            background:var(--glass-bg);
            backdrop-filter:var(--blur);
            -webkit-backdrop-filter:var(--blur);
            border:1px solid var(--glass-border);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
        }
        .btn{
            display:inline-flex; align-items:center; gap:0.5rem;
            padding:0.6rem 1.2rem; border-radius:2.5rem; border:none;
            font-weight:600; cursor:pointer; transition:all 0.2s;
            background:var(--accent); color:white;
            font-size:0.9rem;
        }
        .btn:hover{ filter:brightness(1.15); transform:translateY(-1px); }
        .btn-secondary{ background:var(--surface); color:var(--text); border:1px solid var(--glass-border); }
        .btn-sm{ padding:0.4rem 1rem; font-size:0.8rem; }
        .app-container{ display:flex; height:100vh; overflow:hidden; }
        .sidebar{
            width:260px; background:var(--surface); padding:1.5rem;
            border-right:1px solid var(--glass-border);
            display:flex; flex-direction:column; gap:1.2rem;
            transition:transform 0.3s;
        }
        .main-content{ flex:1; overflow-y:auto; padding:2rem; }
        @media(max-width:768px){
            .sidebar{ position:fixed; z-index:100; height:100%; }
            .sidebar.hidden{ transform:translateX(-100%); }
            .main-content{ padding:1rem; }
            .bottom-nav{
                position:fixed; bottom:0; left:0; right:0;
                background:var(--surface); border-top:1px solid var(--glass-border);
                display:flex; justify-content:space-around; padding:0.5rem;
                z-index:50;
            }
        }
        .task-item{
            display:flex; align-items:center; gap:1rem;
            padding:1rem; margin-bottom:0.5rem; cursor:pointer;
            transition:transform 0.2s;
        }
        .task-item:hover{ transform:scale(1.01); }
        .task-checkbox{
            width:1.5rem; height:1.5rem; border-radius:50%;
            border:2px solid var(--text-secondary); cursor:pointer;
            display:grid; place-items:center; flex-shrink:0;
        }
        .task-checkbox.completed{ background:var(--success); border-color:var(--success); color:white; }
        .priority-tag{
            font-size:0.7rem; padding:0.15rem 0.5rem; border-radius:2rem;
            font-weight:600; color:white; text-transform:uppercase;
        }
        .line-through{ text-decoration:line-through; opacity:0.6; }
        .empty-state{ text-align:center; padding:4rem; opacity:0.6; }
        .modal-overlay{
            position:fixed; inset:0; background:rgba(0,0,0,0.5);
            display:flex; align-items:center; justify-content:center;
            z-index:200;
        }
        .modal-content{ width:90%; max-width:500px; padding:2rem; }
        input, select{ padding:0.6rem; border-radius:0.5rem; border:1px solid var(--glass-border); background:var(--surface); color:var(--text); width:100%; margin-bottom:0.5rem; }
        .progress-bar{ width:100%; height:8px; background:var(--glass-border); border-radius:4px; overflow:hidden; margin:0.5rem 0; }
        .progress-fill{ height:100%; background:var(--accent); border-radius:4px; transition:width 0.3s; }
        .streak-badge{ background:var(--warning); color:black; padding:0.2rem 0.6rem; border-radius:1rem; font-weight:600; }
        .card-clickable{ cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; }
        .card-clickable:hover{ transform:translateY(-4px); box-shadow:0 12px 24px rgba(0,0,0,0.2); }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity:1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
        }
    </style>
</head>
<body class="dark">
<div class="app-container" id="app"></div>

<script>
    // Dynamic manifest
    const manifest = {
      name: "LifeOS",
      short_name: "LifeOS",
      start_url: ".",
      display: "standalone",
      background_color: "#0f172a",
      theme_color: "#0f172a",
      icons: [{src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%236366f1'/%3E%3C/svg%3E", sizes: "100x100", type: "image/svg+xml"}]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
    const manifestURL = URL.createObjectURL(blob);
    document.querySelector('link[rel="manifest"]').href = manifestURL;

    // Storage
    const STORAGE_KEY = 'lifeos_tasks';
    const SETTINGS_KEY = 'lifeos_settings';
    const DEMO_FLAG_KEY = 'lifeos_demo_loaded';

    function loadTasks() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
    }
    function saveTasks(tasks) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }
    function loadSettings() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{"theme":"dark"}'); }
        catch { return {theme:'dark'}; }
    }
    function saveSettings(settings) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }
    function isDemoLoaded() {
        return localStorage.getItem(DEMO_FLAG_KEY) === 'true';
    }
    function setDemoLoaded() {
        localStorage.setItem(DEMO_FLAG_KEY, 'true');
    }

    // Demo data
    function generateDemoTasks() {
        const today = new Date();
        const todayStr = today.toISOString().slice(0,10);
        const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
        const tomorrowStr = tomorrow.toISOString().slice(0,10);
        const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
        const yesterdayStr = yesterday.toISOString().slice(0,10);
        const dayAfter = new Date(today); dayAfter.setDate(today.getDate()+2);
        const dayAfterStr = dayAfter.toISOString().slice(0,10);
        const lastWeek = new Date(today); lastWeek.setDate(today.getDate()-7);
        const lastWeekStr = lastWeek.toISOString().slice(0,10);
        const day3 = new Date(today); day3.setDate(today.getDate()+3);
        const day3Str = day3.toISOString().slice(0,10);
        const day4 = new Date(today); day4.setDate(today.getDate()+4);
        const day4Str = day4.toISOString().slice(0,10);

        return [
            { id: 'demo1', title: 'Morning meditation', priority: 'medium', scheduledDate: todayStr, scheduledTime: '07:00', recurrence: 'daily', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo2', title: 'Review project proposal', priority: 'critical', scheduledDate: todayStr, scheduledTime: '10:00', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo3', title: 'Gym workout - legs', priority: 'high', scheduledDate: todayStr, scheduledTime: '17:30', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo4', title: 'Read 20 pages', priority: 'low', scheduledDate: todayStr, scheduledTime: '21:00', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo5', title: 'Team standup call', priority: 'medium', scheduledDate: yesterdayStr, scheduledTime: '09:00', status: 'completed', createdAt: new Date().toISOString() },
            { id: 'demo6', title: 'Submit expense report', priority: 'high', scheduledDate: yesterdayStr, scheduledTime: '14:00', status: 'missed', createdAt: new Date().toISOString() },
            { id: 'demo7', title: 'Doctor appointment', priority: 'critical', scheduledDate: yesterdayStr, scheduledTime: '11:30', status: 'completed', createdAt: new Date().toISOString() },
            { id: 'demo8', title: 'Plan weekend trip', priority: 'low', scheduledDate: tomorrowStr, status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo9', title: 'Write blog draft', priority: 'medium', scheduledDate: tomorrowStr, scheduledTime: '15:00', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo10', title: 'Car servicing', priority: 'high', scheduledDate: dayAfterStr, status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo11', title: 'Monthly review', priority: 'medium', scheduledDate: dayAfterStr, scheduledTime: '11:00', recurrence: 'monthly', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo12', title: 'Buy groceries', priority: 'low', scheduledDate: lastWeekStr, status: 'completed', createdAt: new Date().toISOString() },
            { id: 'demo13', title: 'Laundry', priority: 'low', scheduledDate: todayStr, status: 'archived', createdAt: new Date().toISOString() },
            { id: 'demo14', title: 'Call mom', priority: 'high', scheduledDate: todayStr, scheduledTime: '19:00', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo15', title: 'Prepare presentation', priority: 'critical', scheduledDate: tomorrowStr, scheduledTime: '08:30', status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo16', title: 'Pick up dry cleaning', priority: 'low', scheduledDate: day3Str, status: 'active', createdAt: new Date().toISOString() },
            { id: 'demo17', title: 'Dentist appointment', priority: 'high', scheduledDate: day4Str, scheduledTime: '10:00', status: 'active', createdAt: new Date().toISOString() }
        ];
    }

    // State
    let tasks = loadTasks();
    let settings = loadSettings();
    let currentView = 'dashboard';
    let theme = settings.theme || 'dark';
    let filterStatus = 'all';

    if (!isDemoLoaded() && tasks.length === 0) {
        tasks = generateDemoTasks();
        saveTasks(tasks);
        setDemoLoaded();
    }

    document.body.className = theme;

    const appEl = document.getElementById('app');

    function render() {
        const isMobile = window.innerWidth < 768;
        appEl.innerHTML = `
            <div class="sidebar ${isMobile ? 'hidden' : ''}" id="sidebar">
                <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:1.5rem;">
                    <div style="width:40px; height:40px; background:var(--accent); border-radius:12px; display:grid; place-items:center; color:white; font-weight:bold;">L</div>
                    <h1 style="font-size:1.2rem;">LifeOS</h1>
                </div>
                <nav style="display:flex; flex-direction:column; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="switchView('dashboard')">📊 Dashboard</button>
                    <button class="btn btn-secondary" onclick="switchView('tasks')">✅ Tasks</button>
                    <button class="btn btn-secondary" onclick="switchView('calendar')">📅 Calendar</button>
                    <button class="btn btn-secondary" onclick="switchView('analytics')">📈 Analytics</button>
                </nav>
                <div style="margin-top:auto; display:flex; flex-wrap:wrap; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="toggleTheme()">${theme==='dark'?'☀️':'🌙'}</button>
                    <button class="btn btn-secondary" onclick="exportTasks()" title="Export Backup">💾</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📂</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importTasks(event)">
                    <button class="btn btn-secondary" onclick="clearAllData()" title="Delete All Data">🗑️</button>
                    ${!isMobile ? '<button class="btn btn-secondary" onclick="document.getElementById(\'sidebar\').classList.toggle(\'hidden\')">📱</button>' : ''}
                </div>
            </div>
            <div class="main-content" id="main-content">
                ${getViewContent()}
            </div>
            ${isMobile ? `
                <div class="bottom-nav">
                    <button class="btn btn-secondary btn-sm" onclick="switchView('dashboard')">🏠</button>
                    <button class="btn btn-secondary btn-sm" onclick="switchView('tasks')">✅</button>
                    <button class="btn btn-secondary btn-sm" onclick="switchView('calendar')">📅</button>
                    <button class="btn btn-secondary btn-sm" onclick="switchView('analytics')">📈</button>
                </div>` : ''}
        `;
        attachEventListeners();
    }

    function attachEventListeners() {
        const quickAddBtn = document.getElementById('open-quick-add');
        if (quickAddBtn) quickAddBtn.onclick = openQuickAdd;
        const addTaskBtn = document.getElementById('open-add-task');
        if (addTaskBtn) addTaskBtn.onclick = openAddTask;
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.oninput = searchTasks;
        const sortSelect = document.getElementById('sortSelect');
        if (sortSelect) sortSelect.onchange = sortTasks;

        const todayCard = document.getElementById('card-today');
        if (todayCard) todayCard.onclick = () => goToFilteredTasks('today');
        const overdueCard = document.getElementById('card-overdue');
        if (overdueCard) overdueCard.onclick = () => goToFilteredTasks('overdue');
        const doneCard = document.getElementById('card-done');
        if (doneCard) doneCard.onclick = () => goToFilteredTasks('completed-today');
    }

    function goToFilteredTasks(type) {
        currentView = 'tasks';
        filterStatus = type;
        render();
    }

    function getViewContent() {
        switch(currentView) {
            case 'dashboard': return renderDashboard();
            case 'tasks': return renderTaskList();
            case 'calendar': return renderCalendar();
            case 'analytics': return renderAnalytics();
            default: return '';
        }
    }

    function renderDashboard() {
        const today = new Date().toISOString().slice(0,10);
        const todayTasks = tasks.filter(t => t.scheduledDate === today && t.status !== 'completed' && t.status !== 'archived');
        const overdue = tasks.filter(t => t.scheduledDate < today && t.status !== 'completed' && t.status !== 'archived');
        const completedToday = tasks.filter(t => t.status === 'completed' && t.scheduledDate === today);
        const hours = new Date().getHours();
        const greeting = hours < 12 ? 'Morning' : hours < 18 ? 'Afternoon' : 'Evening';
        const streak = calculateStreak();

        const upcomingTasks = [];
        for (let i = 1; i <= 7; i++) {
            const d = new Date();
            d.setDate(d.getDate() + i);
            const dateStr = d.toISOString().slice(0,10);
            const dayTasks = tasks.filter(t => t.scheduledDate === dateStr && t.status !== 'completed' && t.status !== 'archived');
            if (dayTasks.length) upcomingTasks.push({date: dateStr, tasks: dayTasks, dayName: d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})});
        }

        return `
            <div class="glass" style="padding:1.5rem; margin-bottom:1.5rem;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Good ${greeting}, Champ!</h2>
                    ${streak > 1 ? `<span class="streak-badge">🔥 ${streak} day streak</span>` : ''}
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:1rem; margin-top:1rem;">
                    <div class="glass card-clickable" id="card-today" style="padding:1rem; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold;">${todayTasks.length}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">Today</div>
                    </div>
                    <div class="glass card-clickable" id="card-overdue" style="padding:1rem; text-align:center; background:rgba(239,68,68,0.15);">
                        <div style="font-size:2rem; font-weight:bold;">${overdue.length}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">Overdue</div>
                    </div>
                    <div class="glass card-clickable" id="card-done" style="padding:1rem; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold;">${completedToday.length}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">Done</div>
                    </div>
                </div>
                <button class="btn" style="margin-top:1rem;" id="open-quick-add">+ Quick Add Task</button>
            </div>
            <h3 style="margin-bottom:0.5rem;">Today's Tasks</h3>
            <div>${todayTasks.length ? todayTasks.map(t => taskHTML(t)).join('') : '<div class="empty-state">No tasks for today 🎉</div>'}</div>

            ${upcomingTasks.length ? `
                <h3 style="margin-top:2rem; margin-bottom:0.5rem;">📅 Upcoming Tasks</h3>
                ${upcomingTasks.map(day => `
                    <div style="margin-bottom:1rem;">
                        <div style="font-weight:600; margin-bottom:0.3rem; color:var(--text-secondary);">${day.dayName}</div>
                        ${day.tasks.map(t => taskHTML(t)).join('')}
                    </div>
                `).join('')}
            ` : '<div class="empty-state" style="padding:2rem;">No upcoming tasks for the next 7 days</div>'}
        `;
    }

    function calculateStreak() {
        let streak = 0;
        for (let i = 0; i < 365; i++) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().slice(0,10);
            if (tasks.some(t => t.status === 'completed' && t.scheduledDate === dateStr)) streak++;
            else break;
        }
        return streak;
    }

    function taskHTML(task) {
        const pColors = {critical:'#ef4444', high:'#f59e0b', medium:'#3b82f6', low:'#10b981', someday:'#8b5cf6'};
        const archived = task.status === 'archived';
        return `
            <div class="glass task-item" style="${archived ? 'opacity:0.5;' : ''}">
                <div class="task-checkbox ${task.status==='completed'?'completed':''}" onclick="event.stopPropagation(); toggleComplete('${task.id}')">
                    ${task.status==='completed'?'✓':''}
                </div>
                <div style="flex:1;" onclick="event.stopPropagation(); openTaskDetail('${task.id}')">
                    <div style="font-weight:500;" class="${(task.status==='completed' || archived) ?'line-through':''}">${task.title}</div>
                    <div style="font-size:0.75rem; opacity:0.7; display:flex; gap:0.5rem; align-items:center; margin-top:0.2rem;">
                        ${task.scheduledTime ? `<span>⏰ ${task.scheduledTime}</span>` : ''}
                        <span class="priority-tag" style="background:${pColors[task.priority]}">${task.priority}</span>
                        ${archived ? '<span style="background:#64748b;color:white;padding:0.1rem 0.4rem;border-radius:1rem;font-size:0.6rem;">ARCHIVED</span>' : ''}
                        ${task.recurrence ? `<span style="font-size:0.6rem; opacity:0.7;">🔁 ${task.recurrence}</span>` : ''}
                    </div>
                </div>
                <div style="display:flex; gap:0.2rem;">
                    ${!archived ? `<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); postponeTask('${task.id}')">⏩</button>` : ''}
                    <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); ${archived ? `restoreTask('${task.id}')` : `archiveTask('${task.id}')`}">${archived ? '📤' : '📥'}</button>
                </div>
            </div>
        `;
    }

    function renderTaskList() {
        const filtered = getFilteredTasks();
        let heading = 'All Tasks';
        if (filterStatus === 'today') heading = "Today's Tasks";
        else if (filterStatus === 'overdue') heading = 'Overdue Tasks';
        else if (filterStatus === 'completed') heading = 'Completed Tasks';
        else if (filterStatus === 'completed-today') heading = "Today's Completed Tasks";
        else if (filterStatus === 'archived') heading = 'Archived Tasks';

        return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h2>${heading}</h2>
                <button class="btn" id="open-add-task">+ Add Task</button>
            </div>
            <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;">
                <input type="text" placeholder="Search tasks..." id="searchInput" style="margin-bottom:0; width:200px;" />
                <select id="sortSelect" style="width:auto; margin-bottom:0;">
                    <option value="date">Sort by Date</option>
                    <option value="priority">Sort by Priority</option>
                    <option value="completed">Sort by Completed</option>
                </select>
                <button class="btn btn-secondary btn-sm" onclick="filterTasks('all')">All</button>
                <button class="btn btn-secondary btn-sm" onclick="filterTasks('today')">Today</button>
                <button class="btn btn-secondary btn-sm" onclick="filterTasks('overdue')">Overdue</button>
                <button class="btn btn-secondary btn-sm" onclick="filterTasks('completed')">Completed</button>
                <button class="btn btn-secondary btn-sm" onclick="filterTasks('archived')">Archived</button>
            </div>
            <div id="task-list">${filtered.length ? filtered.map(t => taskHTML(t)).join('') : '<div class="empty-state">No tasks</div>'}</div>
        `;
    }

    function getFilteredTasks() {
        const today = new Date().toISOString().slice(0,10);
        let result = [...tasks];
        switch (filterStatus) {
            case 'today':
                result = result.filter(t => t.scheduledDate === today && t.status !== 'completed' && t.status !== 'archived');
                break;
            case 'overdue':
                result = result.filter(t => t.scheduledDate < today && t.status !== 'completed' && t.status !== 'archived');
                break;
            case 'active':
                result = result.filter(t => t.status !== 'completed' && t.status !== 'archived');
                break;
            case 'completed':
                result = result.filter(t => t.status === 'completed');
                break;
            case 'completed-today':
                result = result.filter(t => t.status === 'completed' && t.scheduledDate === today);
                break;
            case 'archived':
                result = result.filter(t => t.status === 'archived');
                break;
        }
        const searchTerm = document.getElementById('searchInput')?.value.toLowerCase();
        if (searchTerm) result = result.filter(t => t.title.toLowerCase().includes(searchTerm));
        const sortBy = document.getElementById('sortSelect')?.value || 'date';
        if (sortBy === 'date') result.sort((a,b) => (a.scheduledDate||'').localeCompare(b.scheduledDate||''));
        else if (sortBy === 'priority') {
            const pOrder = {critical:0, high:1, medium:2, low:3, someday:4};
            result.sort((a,b) => (pOrder[a.priority]||2) - (pOrder[b.priority]||2));
        } else if (sortBy === 'completed') result.sort((a,b) => (a.status==='completed'?1:0) - (b.status==='completed'?1:0));
        return result;
    }

    function filterTasks(status) {
        filterStatus = status;
        const listEl = document.getElementById('task-list');
        if (listEl) {
            const filtered = getFilteredTasks();
            listEl.innerHTML = filtered.length ? filtered.map(t => taskHTML(t)).join('') : '<div class="empty-state">No tasks</div>';
        }
    }

    function searchTasks() { filterTasks(filterStatus); }
    function sortTasks() { filterTasks(filterStatus); }

    function renderCalendar() {
        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();
        let calHTML = '<div class="glass" style="padding:1.5rem;"><h2>'+today.toLocaleString('default',{month:'long',year:'numeric'})+'</h2><div style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:1rem;">';
        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=> calHTML += `<div style="text-align:center; font-weight:600;">${d}</div>`);
        for(let i=0; i<firstDay; i++) calHTML+='<div></div>';
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const count = tasks.filter(t => t.scheduledDate === dateStr && t.status !== 'archived').length;
            calHTML += `<div class="glass" style="padding:0.25rem; text-align:center; cursor:pointer; min-height:40px;" onclick="showDayTasks('${dateStr}')">
                <div>${d}</div>
                ${count ? `<div style="font-size:0.6rem; color:var(--accent);">${count}</div>` : ''}
            </div>`;
        }
        calHTML+='</div></div>';
        return calHTML;
    }

    function showDayTasks(dateStr) {
        const dayTasks = tasks.filter(t => t.scheduledDate === dateStr && t.status !== 'archived');
        const list = dayTasks.length ? dayTasks.map(t=>t.title).join('\n') : 'No tasks';
        alert(`Tasks on ${dateStr}:\n${list}`);
    }

    function renderAnalytics() {
        const completed = tasks.filter(t=>t.status==='completed').length;
        const total = tasks.filter(t=>t.status!=='archived').length || 1;
        const rate = Math.round((completed/total)*100);
        const weeklyData = getWeeklyCompletion();
        return `
            <div class="glass" style="padding:1.5rem;">
                <h2>Productivity Overview</h2>
                <div style="display:flex; gap:2rem; margin-top:1rem;">
                    <div style="text-align:center;">
                        <div style="font-size:3rem; font-weight:bold;">${rate}%</div>
                        <div>Completion Rate</div>
                        <div class="progress-bar" style="margin-top:0.5rem;"><div class="progress-fill" style="width:${rate}%"></div></div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:3rem; font-weight:bold;">${completed}</div>
                        <div>Tasks Done</div>
                    </div>
                </div>
                <h3 style="margin-top:2rem;">This Week</h3>
                <div style="display:flex; gap:0.5rem; align-items:flex-end; height:100px;">
                    ${weeklyData.map(d => `<div style="flex:1; text-align:center;">
                        <div style="height:${d.percent}px; background:var(--accent); border-radius:4px 4px 0 0; width:100%; min-height:4px;"></div>
                        <div style="font-size:0.6rem; margin-top:0.2rem;">${d.day}</div>
                    </div>`).join('')}
                </div>
            </div>
        `;
    }

    function getWeeklyCompletion() {
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const today = new Date();
        const startOfWeek = new Date(today);
        startOfWeek.setDate(today.getDate() - today.getDay());
        return days.map((day, i) => {
            const date = new Date(startOfWeek);
            date.setDate(startOfWeek.getDate() + i);
            const dateStr = date.toISOString().slice(0,10);
            const done = tasks.filter(t => t.status==='completed' && t.scheduledDate===dateStr).length;
            const total = tasks.filter(t => t.scheduledDate===dateStr && t.status!=='archived').length || 1;
            return {day, percent: Math.round((done/total)*100)};
        });
    }

    function toggleComplete(id) {
        const task = tasks.find(t=>t.id===id);
        if(task) {
            task.status = task.status==='completed' ? 'active' : 'completed';
            if(task.status==='completed') celebrate();
            saveTasks(tasks);
            render();
        }
    }

    function celebrate() {
        const colors = ['#6366f1','#10b981','#f59e0b','#ef4444'];
        for(let i=0; i<20; i++) {
            const confetti = document.createElement('div');
            confetti.style.cssText = `position:fixed; top:-10px; left:${Math.random()*100}%; width:10px; height:10px; background:${colors[Math.floor(Math.random()*colors.length)]}; border-radius:50%; z-index:999; animation:fall 1.5s ease-out forwards; animation-delay:${Math.random()*0.5}s;`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2000);
        }
    }

    function openQuickAdd() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content glass">
                <h3>Quick Add Task</h3>
                <input id="quickTitle" placeholder="Task title" />
                <div style="display:flex; gap:0.5rem;">
                    <select id="quickPriority">
                        <option value="medium">Medium</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                        <option value="someday">Someday</option>
                    </select>
                    <input type="date" id="quickDate" />
                </div>
                <input type="time" id="quickTime" placeholder="Time (optional)" />
                <select id="quickRecurrence" style="margin-bottom:0.5rem;">
                    <option value="">No repeat</option>
                    <option value="daily">Daily</option>
                    <option value="weekdays">Weekdays</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
                <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem;">
                    <button class="btn btn-secondary" id="cancel-add">Cancel</button>
                    <button class="btn" id="save-quick">Add</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('quickDate').value = new Date().toISOString().slice(0,10);
        document.getElementById('save-quick').addEventListener('click', () => {
            const title = document.getElementById('quickTitle').value.trim();
            if (!title) return alert('Title is required');
            const task = {
                id: Date.now().toString(),
                title,
                priority: document.getElementById('quickPriority').value,
                scheduledDate: document.getElementById('quickDate').value,
                scheduledTime: document.getElementById('quickTime').value || null,
                recurrence: document.getElementById('quickRecurrence').value || null,
                status: 'active',
                createdAt: new Date().toISOString()
            };
            tasks.push(task);
            saveTasks(tasks);
            modal.remove();
            render();
            scheduleReminder(task);
        });
        document.getElementById('cancel-add').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }

    function openAddTask() { openQuickAdd(); }

    function openTaskDetail(id) {
        const task = tasks.find(t=>t.id===id);
        if (!task) return;
        alert(`Task: ${task.title}\nPriority: ${task.priority}\nStatus: ${task.status}\nDate: ${task.scheduledDate}${task.scheduledTime ? '\nTime: '+task.scheduledTime : ''}${task.recurrence ? '\nRecurrence: '+task.recurrence : ''}`);
    }

    function postponeTask(id) {
        const task = tasks.find(t=>t.id===id);
        if (!task) return;
        const newDate = prompt('Enter new date (YYYY-MM-DD)', task.scheduledDate);
        if (newDate) {
            task.scheduledDate = newDate;
            task.status = 'active';
            saveTasks(tasks);
            render();
        }
    }

    function archiveTask(id) {
        const task = tasks.find(t=>t.id===id);
        if (task) { task.status = 'archived'; saveTasks(tasks); render(); }
    }

    function restoreTask(id) {
        const task = tasks.find(t=>t.id===id);
        if (task) { task.status = 'active'; saveTasks(tasks); render(); }
    }

    function clearAllData() {
        if (confirm('Delete ALL tasks and settings? This cannot be undone.')) {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(SETTINGS_KEY);
            localStorage.removeItem(DEMO_FLAG_KEY);
            location.reload();
        }
    }

    function exportTasks() {
        const dataStr = JSON.stringify(tasks, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'lifeos_backup.json'; a.click();
        URL.revokeObjectURL(url);
    }

    function importTasks(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    tasks = imported;
                    saveTasks(tasks);
                    render();
                    alert('Backup restored!');
                }
            } catch { alert('Invalid file'); }
        };
        reader.readAsText(file);
    }

    function switchView(view) {
        currentView = view;
        if (view !== 'tasks') filterStatus = 'all';
        render();
    }

    function toggleTheme() {
        theme = theme==='dark' ? 'light' : 'dark';
        document.body.className = theme;
        settings.theme = theme;
        saveSettings(settings);
        render();
    }

    function checkRecurringTasks() {
        const today = new Date().toISOString().slice(0,10);
        tasks.forEach(task => {
            if (task.status === 'completed' && task.recurrence && !task.recurrenceProcessed) {
                const nextDate = getNextRecurrence(task.scheduledDate, task.recurrence);
                if (nextDate && nextDate <= today) {
                    tasks.push({
                        id: Date.now().toString(),
                        title: task.title,
                        priority: task.priority,
                        scheduledDate: nextDate,
                        scheduledTime: task.scheduledTime,
                        recurrence: task.recurrence,
                        status: 'active',
                        createdAt: new Date().toISOString()
                    });
                    task.recurrenceProcessed = true;
                    saveTasks(tasks);
                }
            }
        });
    }

    function getNextRecurrence(currentDate, type) {
        const date = new Date(currentDate);
        switch(type) {
            case 'daily': date.setDate(date.getDate() + 1); break;
            case 'weekdays':
                do { date.setDate(date.getDate() + 1); } while (date.getDay() === 0 || date.getDay() === 6);
                break;
            case 'weekly': date.setDate(date.getDate() + 7); break;
            case 'monthly': date.setMonth(date.getMonth() + 1); break;
            default: return null;
        }
        return date.toISOString().slice(0,10);
    }

    function requestNotificationPermission() {
        if('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }

    function scheduleReminder(task) {
        if(task.status !== 'active' || !task.scheduledDate) return;
        const due = new Date(task.scheduledDate);
        if(task.scheduledTime) {
            const [h,m] = task.scheduledTime.split(':');
            due.setHours(+h,+m,0,0);
        } else {
            due.setHours(9,0,0,0);
        }
        const delay = due.getTime() - Date.now();
        if(delay > 0 && delay < 86400000) {
            setTimeout(() => {
                if(Notification.permission === 'granted') {
                    new Notification(`⏰ Reminder: ${task.title}`, {
                        body: `Due now! Priority: ${task.priority}`,
                        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%236366f1"/%3E%3C/svg%3E',
                        requireInteraction: true
                    });
                }
            }, delay);
        }
    }

    function scheduleAllReminders() {
        tasks.forEach(task => scheduleReminder(task));
    }

    window.onload = () => {
        requestNotificationPermission();
        checkRecurringTasks();
        render();
        scheduleAllReminders();
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                if (window.innerWidth >= 768) sidebar.classList.remove('hidden');
                else sidebar.classList.add('hidden');
            }
            render();
        });
    };
</script>
</body>
</html>
